# Timefold Solver configuration
quarkus.timefold.solver.termination.spent-limit=5m
quarkus.timefold.solver.move-thread-count=AUTO

# REST
quarkus.http.port=8081
quarkus.http.host=0.0.0.0

# Logging
quarkus.log.category."ai.timefold".level=INFO
quarkus.log.category."at.schoolflow".level=DEBUG

# Health
quarkus.health.enabled=true

# Jackson
quarkus.jackson.fail-on-unknown-properties=false
