name: Playwright E2E

# Runs the full Phase-10 Playwright suite on every PR to main + every push
# to main. This is the gate that lifts the manual-UAT ban per
# `feedback_e2e_first_no_uat.md`: admin-console regressions (silent-4xx,
# Zeitraster persistence, Schuljahre orphan-guard, Optionen A/B toggle)
# must be caught in CI before they ship to a school.
#
# Service layout:
#   - Postgres 17 and Redis 7 run as GitHub "services" containers with
#     health-checks — fastest and most reliable for CI.
#   - Keycloak 26.5.6 runs via `docker compose` because the realm import
#     (`docker/keycloak/realm-export.json`) is mounted as a volume and the
#     hard-coded test-user UUIDs (seed <-> Keycloak linkage) depend on it.
#   - API is built with `pnpm --filter @schoolflow/api build` and launched
#     via `node dist/main.js` after the shared-dist `.js`-extension post-
#     process described in `feedback_restart_api_after_migration.md`.
#   - Web is served via `vite preview` for CI reproducibility (no HMR,
#     lower memory, identical routing to production).
#
# Artifacts:
#   - Playwright HTML report + traces (on failure) uploaded as
#     `playwright-traces`.
#   - UAT screenshots generated by `screenshots.spec.ts` uploaded as the
#     same artifact bundle so reviewers can eyeball the Phase-10 hero
#     shots from the run page.
#
# Manual trigger: `workflow_dispatch` is included so maintainers can
# re-run the suite against an existing SHA without opening a PR.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: schoolflow
          POSTGRES_PASSWORD: schoolflow_dev
          POSTGRES_DB: schoolflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U schoolflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://schoolflow:schoolflow_dev@localhost:5432/schoolflow
      SHADOW_DATABASE_URL: postgresql://schoolflow:schoolflow_dev@localhost:5432/schoolflow_shadow
      REDIS_URL: redis://localhost:6379
      KEYCLOAK_URL: http://localhost:8080
      KEYCLOAK_REALM: schoolflow
      KEYCLOAK_CLIENT_ID: schoolflow-api
      # VAPID secrets fall back to the dev keypair from `.env.example` so the
      # API boot doesn't crash when the repo has no CI secrets configured.
      # Production deploys MUST provide real secrets via repo settings.
      VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY || 'BPeB9cWlM3JmH9qOHVmDaEPUu-ge0KsRf-FV3e_Sw_l8LPw37q8MZ-ywlBp40jrAH_tlZJ8fbpaya27h6w3DgSE' }}
      VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY || '9zvNGSCLHASLT6X9uCUHuKWzj9IQUuGRiBhMXWArGHE' }}
      VAPID_SUBJECT: mailto:admin@schoolflow.example
      E2E_ADMIN_USER: admin-user
      E2E_ADMIN_PASS: admin123
      PLAYWRIGHT_BASE_URL: http://localhost:5173

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Keycloak needs the realm-export volume mounted — easiest way is to
      # reuse the dev compose file. The `keycloak-db` service is its own
      # Postgres container (separate from the GitHub-service Postgres which
      # is the application DB).
      - name: Start Keycloak (Docker Compose)
        run: docker compose -f docker/docker-compose.yml up -d keycloak keycloak-db

      - name: Wait for Keycloak realm discovery
        run: |
          timeout 180 bash -c '
            until curl -sf http://localhost:8080/realms/schoolflow/.well-known/openid-configuration > /dev/null; do
              echo "waiting for Keycloak..."
              sleep 3
            done
          '

      # Shared package uses ESNext module + extensionless relative imports
      # (see feedback_restart_api_after_migration.md). Node 24 ESM refuses
      # to resolve those, so we append `.js` extensions to every relative
      # specifier in the compiled dist before the API tries to load it.
      - name: Build shared package
        run: pnpm --filter @schoolflow/shared build

      - name: Post-process shared dist ESM extensions
        run: |
          cd packages/shared/dist
          find . -name "*.js" -exec perl -i -pe "s{from '(\.\.?/[^']+?)'}{from '\$1.js'}g unless /\.js'/; s{from \"(\.\.?/[^\"]+?)\"}{from \"\$1.js\"}g unless /\.js\"/" {} +

      - name: Create shadow database
        run: |
          PGPASSWORD=schoolflow_dev psql -h localhost -U schoolflow -d schoolflow -c "CREATE DATABASE schoolflow_shadow;" || echo "shadow DB already exists"

      - name: Prisma generate + migrate deploy
        run: |
          pnpm --filter @schoolflow/api exec prisma generate
          pnpm --filter @schoolflow/api exec prisma migrate deploy

      - name: Prisma seed (admin user + sample school + Keycloak linkage)
        run: pnpm --filter @schoolflow/api exec tsx prisma/seed.ts

      - name: Build API
        run: pnpm --filter @schoolflow/api build

      - name: Build Web
        run: pnpm --filter @schoolflow/web build

      - name: Install Playwright browsers
        run: pnpm --filter @schoolflow/web exec playwright install chromium --with-deps

      - name: Start API (background)
        run: |
          nohup node apps/api/dist/main.js > api.log 2>&1 &
          echo "API PID: $!"

      - name: Start Web preview (background)
        run: |
          nohup pnpm --filter @schoolflow/web exec vite preview --host 0.0.0.0 --port 5173 > web.log 2>&1 &
          echo "Web PID: $!"

      - name: Wait for API health
        run: |
          timeout 90 bash -c '
            until curl -sf http://localhost:3000/api/v1/health > /dev/null; do
              echo "waiting for API..."
              sleep 2
            done
          '

      - name: Wait for Web preview
        run: |
          timeout 90 bash -c '
            until curl -sf http://localhost:5173 > /dev/null; do
              echo "waiting for Vite preview..."
              sleep 2
            done
          '

      - name: Run Playwright tests
        run: pnpm --filter @schoolflow/web exec playwright test

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: |
            apps/web/test-results/
            apps/web/playwright-report/
            .planning/phases/10-schulstammdaten-zeitraster/uat-screenshots/
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload server logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-logs
          path: |
            api.log
            web.log
          retention-days: 7
          if-no-files-found: ignore
