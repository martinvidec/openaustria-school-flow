name: Playwright E2E

# Runs the full Phase-10 Playwright suite on every PR to main + every push
# to main. This is the gate that lifts the manual-UAT ban per
# `feedback_e2e_first_no_uat.md`: admin-console regressions (silent-4xx,
# Zeitraster persistence, Schuljahre orphan-guard, Optionen A/B toggle)
# must be caught in CI before they ship to a school.
#
# Service layout:
#   - Postgres 17 and Redis 7 run as GitHub "services" containers with
#     health-checks — fastest and most reliable for CI.
#   - Keycloak 26.5.6 runs via `docker compose` because the realm import
#     (`docker/keycloak/realm-export.json`) is mounted as a volume and the
#     hard-coded test-user UUIDs (seed <-> Keycloak linkage) depend on it.
#   - API is built with `pnpm --filter @schoolflow/api build` and launched
#     via `node dist/main.js` after the shared-dist `.js`-extension post-
#     process described in `feedback_restart_api_after_migration.md`.
#   - Web is served via `vite preview` for CI reproducibility (no HMR,
#     lower memory, identical routing to production).
#
# Artifacts:
#   - Playwright HTML report + traces (on failure) uploaded as
#     `playwright-traces`.
#   - UAT screenshots generated by `screenshots.spec.ts` uploaded as the
#     same artifact bundle so reviewers can eyeball the Phase-10 hero
#     shots from the run page.
#
# Manual trigger: `workflow_dispatch` is included so maintainers can
# re-run the suite against an existing SHA without opening a PR.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    # 30min was a tight fit when E2E ran in ~27min (run 25305740126); recent
    # runs hit the wall when Ubuntu apt mirrors throttle the
    # `playwright install --with-deps` step:
    #   - run 25389283473: 28min just installing OS deps, never reached tests.
    #   - run 25402371007: 40min setup + 17min tests = cancelled at 60min mid-mobile-chrome.
    # 90min gives buffer for slow apt (~30-40min worst case) + full e2e (~25-30min)
    # + artifact upload, with ~15min headroom. Browser-binary download is also
    # cached separately (see "Cache Playwright browsers" step below) so only the
    # `--with-deps` apt step retains its variability.
    timeout-minutes: 90

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: schoolflow
          POSTGRES_PASSWORD: schoolflow_dev
          POSTGRES_DB: schoolflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U schoolflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://schoolflow:schoolflow_dev@localhost:5432/schoolflow
      SHADOW_DATABASE_URL: postgresql://schoolflow:schoolflow_dev@localhost:5432/schoolflow_shadow
      REDIS_URL: redis://localhost:6379
      KEYCLOAK_URL: http://localhost:8080
      KEYCLOAK_REALM: schoolflow
      KEYCLOAK_CLIENT_ID: schoolflow-api
      # Service-account credentials for the NestJS Keycloak Admin client
      # (UserDirectoryService, RoleManagementService, link-person flows).
      # The realm import (`docker/keycloak/realm-export.json`) ships the
      # `schoolflow-admin-api` confidential client and grants the synthetic
      # service-account user `realm-management/{view-users,manage-users,
      # view-realm,view-clients}`. The secret is a clearly-dev-only literal
      # because the Keycloak instance is bound to localhost on the runner —
      # NEVER reuse this in production.
      KEYCLOAK_ADMIN_CLIENT_ID: schoolflow-admin-api
      KEYCLOAK_ADMIN_CLIENT_SECRET: local-dev-only-secret
      # VAPID keypair MUST be provided via repo secrets — no inline fallback.
      # The previous dev keypair was rotated on 2026-05-01 (see
      # .planning/quick/260501-sus-vapid-dev-keypair-rotieren-neuen-keypair/SUMMARY.md);
      # CI now hard-fails (preflight step below) when either secret is empty.
      VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
      VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
      VAPID_SUBJECT: mailto:admin@schoolflow.example
      E2E_ADMIN_USER: admin-user
      E2E_ADMIN_PASS: admin123
      PLAYWRIGHT_BASE_URL: http://localhost:5173

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Preflight — VAPID secrets present
        run: |
          if [ -z "${VAPID_PUBLIC_KEY:-}" ] || [ -z "${VAPID_PRIVATE_KEY:-}" ]; then
            echo "::error::VAPID_PUBLIC_KEY and VAPID_PRIVATE_KEY repo secrets must be set."
            echo "::error::Generate via: pnpm --filter @schoolflow/api exec web-push generate-vapid-keys --json"
            echo "::error::Then: gh secret set VAPID_PUBLIC_KEY  / gh secret set VAPID_PRIVATE_KEY"
            exit 1
          fi
          echo "VAPID secrets present (public key length=${#VAPID_PUBLIC_KEY}, private length=${#VAPID_PRIVATE_KEY})."

      # Keycloak needs the realm-export volume mounted — easiest way is to
      # reuse the dev compose file. The `keycloak-db` service is its own
      # Postgres container (separate from the GitHub-service Postgres which
      # is the application DB).
      #
      # The `solver` service is the Timefold sidecar (Quarkus/Java 21).
      # `apps/web/e2e/helpers/global-setup.ts:41` precheck-pings
      # http://localhost:8081/health — without this the entire Playwright
      # run aborts in globalSetup. Maven build is slow on first cache miss
      # (~3-5 min); subsequent runs hit Docker layer cache for the
      # dependency-resolution layer (mvnw dependency:go-offline copies
      # pom.xml first per Dockerfile) and rebuild only the source layer.
      - name: Start Keycloak + Solver (Docker Compose)
        run: docker compose -f docker/docker-compose.yml up -d --build keycloak keycloak-db solver

      - name: Wait for Keycloak realm discovery
        run: |
          timeout 180 bash -c '
            until curl -sf http://localhost:8080/realms/schoolflow/.well-known/openid-configuration > /dev/null; do
              echo "waiting for Keycloak..."
              sleep 3
            done
          '

      - name: Wait for Solver healthcheck
        run: |
          timeout 180 bash -c '
            until curl -sf http://localhost:8081/health > /dev/null; do
              echo "waiting for Timefold solver..."
              sleep 3
            done
          '

      # Shared package uses ESNext module + extensionless relative imports
      # (see feedback_restart_api_after_migration.md). Node 24 ESM refuses
      # to resolve those, so we append `.js` extensions to every relative
      # specifier in the compiled dist before the API tries to load it.
      - name: Build shared package
        run: pnpm --filter @schoolflow/shared build

      - name: Post-process shared dist ESM extensions
        run: |
          cd packages/shared/dist
          find . -name "*.js" -exec perl -i -pe "s{from '(\.\.?/[^']+?)'}{from '\$1.js'}g unless /\.js'/; s{from \"(\.\.?/[^\"]+?)\"}{from \"\$1.js\"}g unless /\.js\"/" {} +

      - name: Create shadow database
        run: |
          PGPASSWORD=schoolflow_dev psql -h localhost -U schoolflow -d schoolflow -c "CREATE DATABASE schoolflow_shadow;" || echo "shadow DB already exists"

      - name: Prisma generate + migrate deploy
        run: |
          pnpm --filter @schoolflow/api exec prisma generate
          pnpm --filter @schoolflow/api exec prisma migrate deploy

      - name: Prisma seed (admin user + sample school + Keycloak linkage)
        run: pnpm --filter @schoolflow/api exec tsx prisma/seed.ts

      - name: Build API
        run: pnpm --filter @schoolflow/api build

      - name: Build Web
        run: pnpm --filter @schoolflow/web build

      # Cache the browser binaries between runs. The cache key is the pnpm
      # lockfile hash so any @playwright/test version bump invalidates it.
      # OS deps (`--with-deps`) still install via apt every run because they
      # land system-wide outside the cache, but skipping the binary download
      # alone saves 3-8 minutes when apt mirrors are slow (the variability
      # that bit run 25389283473 / 25402371007).
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        # Install all 3 engines because playwright.config.ts has 4 projects:
        # desktop=chromium, desktop-firefox=firefox, mobile-chrome=chromium, mobile-375=webkit.
        # Without firefox+webkit, the desktop-firefox + mobile-375 projects all fail with
        # "Executable doesn't exist at /home/runner/.cache/ms-playwright/...". See issue #12.
        # On a cache hit we still run --with-deps to refresh apt-installed system
        # libraries (Playwright's CLI is a no-op on already-present binaries but
        # always re-runs the apt step).
        run: pnpm --filter @schoolflow/web exec playwright install chromium firefox webkit --with-deps

      - name: Start API (background)
        run: |
          nohup node apps/api/dist/main.js > api.log 2>&1 &
          echo "API PID: $!"

      - name: Start Web preview (background)
        run: |
          nohup pnpm --filter @schoolflow/web exec vite preview --host 0.0.0.0 --port 5173 > web.log 2>&1 &
          echo "Web PID: $!"

      - name: Wait for API health
        run: |
          timeout 90 bash -c '
            until curl -sf http://localhost:3000/api/v1/health > /dev/null; do
              echo "waiting for API..."
              sleep 2
            done
          '

      - name: Wait for Web preview
        run: |
          timeout 90 bash -c '
            until curl -sf http://localhost:5173 > /dev/null; do
              echo "waiting for Vite preview..."
              sleep 2
            done
          '

      - name: Run Playwright tests
        run: pnpm --filter @schoolflow/web exec playwright test

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: |
            apps/web/test-results/
            apps/web/playwright-report/
            .planning/phases/10-schulstammdaten-zeitraster/uat-screenshots/
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload server logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-logs
          path: |
            api.log
            web.log
          retention-days: 7
          if-no-files-found: ignore
