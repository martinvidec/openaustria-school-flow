#
# SchoolFlow web nginx config (D-12, DEPLOY-03)
#
# Serves the Vite-built SPA with:
#  - SPA fallback routing (try_files $uri /index.html)
#  - Reverse proxy for /api/* -> api container
#  - Reverse proxy for /socket.io/* -> api container with WebSocket upgrade
#  - Long cache for immutable hashed assets
#  - No cache for index.html so clients always learn about new builds
#
server {
  listen 80 default_server;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Use resolver for runtime DNS (api service lives on the docker network)
  resolver 127.0.0.11 valid=30s;

  # ---------------------------------------------------------------------------
  # Static SPA assets -- hashed, safe to cache aggressively
  # ---------------------------------------------------------------------------
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Service worker and web manifest must NOT be cached long-term or clients
  # will never pick up new builds (Phase 09 PWA workflow).
  location ~* ^/(sw\.js|manifest\.webmanifest|workbox-.*\.js)$ {
    expires -1;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    try_files $uri =404;
  }

  # ---------------------------------------------------------------------------
  # API reverse proxy
  # ---------------------------------------------------------------------------
  location /api/ {
    proxy_pass         http://api:3000;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  # ---------------------------------------------------------------------------
  # Socket.IO reverse proxy with WebSocket upgrade
  # ---------------------------------------------------------------------------
  location /socket.io/ {
    proxy_pass         http://api:3000;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        "upgrade";
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  # ---------------------------------------------------------------------------
  # SPA fallback -- any unmatched path returns index.html so the client-side
  # router (TanStack Router) can take over.
  # ---------------------------------------------------------------------------
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }
}
