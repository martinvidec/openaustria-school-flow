# NOTE: The `api` service is not defined in this dev compose file -- the
# NestJS API runs locally on the host for hot-reload during development
# (see docker/.env.example). The production stack defines the `api`
# container in docker-compose.prod.yml and sources API_INTERNAL_URL from
# docker/.env (TIME-04 solver callback -- see docker/.env.example for
# full documentation). For local dev, export API_INTERNAL_URL in your
# shell env or apps/api/.env before starting the API.
services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: schoolflow
      POSTGRES_USER: schoolflow
      POSTGRES_PASSWORD: schoolflow_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U schoolflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak-db:
    image: postgres:17
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak_dev
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.6
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_dev
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8080
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import
    depends_on:
      keycloak-db:
        condition: service_healthy
    healthcheck:
      # Keycloak 26.5 exposes /health/ready on the management interface by
      # default -- probe the realm discovery doc instead which is always
      # served on the main 8080 port without extra config. `wget` is present
      # in the official quay.io image.
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/realms/master || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  solver:
    build:
      context: ../apps/solver
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      QUARKUS_HTTP_PORT: 8081
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
  keycloak_db_data:
